[modbus]
port = 502
slave_address = 1

[gpio]
# Number of digital outputs (max 8)
num_outputs = 8
# Holding register address for DO bitmask (FC03 read, FC06 write)
do_register = 0x0001
# Polarity: active_high (default) or active_low
polarity = active_high

##### GPIO pin numbers (sysfs) #####################################
do0 = 229
do1 = 230
do2 = 231
do3 = 232
do4 = 233
do5 = 234
do6 = 235
do7 = 236
